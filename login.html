<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Tricolor - Polla Deportiva</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="Accede a la polla oficial de la Selección Colombia para el partido frente a Uzbekistán.">
</head>
<body>
  <div class="glass-card">
    <div class="flag-container">
      <!-- Bandera de Colombia provista por flagcdn -->
      <img src="https://flagcdn.com/w160/co.png" alt="Bandera de Colombia" class="flag-img">
    </div>
    
    <h1 class="title-patriotic">Polla Tricolor</h1>
    <p class="subtitle">Ingresa la contraseña de acceso (validación de pago) para apostar por nuestra Selección.</p>
    
    <form id="login-form">
      <div class="input-group">
        <label for="password" class="input-label">Contraseña de Acceso</label>
        <input 
          type="password" 
          id="password" 
          class="input-field" 
          placeholder="Digita Mundial_123" 
          required 
          autocomplete="off"
        >
        <span class="error-msg" id="error-message">⚠️ La contraseña es incorrecta. Verifica tu comprobante.</span>
      </div>
      
      <button type="submit" class="btn-primary">
        <span>Ingresar a Apostar</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>
    </form>
  </div>

  <script>
    // Limpiar autorización previa al entrar a login
    sessionStorage.removeItem('authorized');

    const loginForm = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('error-message');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const enteredPassword = passwordInput.value.trim();
      
      // Contraseña requerida: Mundial_123
      if (enteredPassword === 'Mundial_123') {
        sessionStorage.setItem('authorized', 'true');
        errorMessage.style.display = 'none';
        
        // Efecto visual de éxito antes de redirigir
        const card = document.querySelector('.glass-card');
        card.style.transform = 'scale(0.95)';
        card.style.opacity = '0.7';
        
        setTimeout(() => {
          window.location.href = 'app.html';
        }, 400);
      } else {
        // Mostrar mensaje de error con animación de sacudida
        errorMessage.style.display = 'block';
        errorMessage.style.animation = 'none';
        errorMessage.offsetHeight; // Forzar reflow
        errorMessage.style.animation = 'shake 0.3s ease-in-out';
        passwordInput.classList.add('error-border');
        passwordInput.focus();
      }
    });

    // Quitar error al escribir de nuevo
    passwordInput.addEventListener('input', () => {
      errorMessage.style.display = 'none';
    });
  </script>
</body>
</html>
